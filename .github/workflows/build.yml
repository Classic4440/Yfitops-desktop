name: Build Windows Application

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build and Package Windows App
        shell: bash
        run: |
          npm run build:renderer
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "Tag detected (${{ github.ref }}). Building and publishing to GitHub Releases..."
            npx electron-builder --win --publish always
          else
            echo "No tag detected. Building draft locally..."
            npx electron-builder --win --publish never
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To enable Windows code signing in the future, uncomment and set up the following secrets:
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpotCheck-Lab-Windows
          path: |
            build/*.exe
            build/*.yml
          retention-days: 7
